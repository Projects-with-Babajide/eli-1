<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Button</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #hud {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #counter {
      position: absolute;
      top: 20px;
      right: 24px;
      color: rgba(0, 0, 0, 0.25);
      font-size: 14px;
      letter-spacing: 2px;
      font-weight: 400;
      transition: color 0.3s;
    }

    #counter.flash {
      color: rgba(0, 0, 0, 0.7);
    }

    #event-name {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(30, 30, 30, 0.9);
      font-size: 22px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.3s ease;
      white-space: nowrap;
      text-shadow: 0 0 20px rgba(0,0,0,0.15);
    }

    #event-name.visible {
      opacity: 1;
    }

    #reward-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    #reward-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    #reward-title {
      font-size: 48px;
      font-weight: bold;
      letter-spacing: 6px;
      color: #111;
      text-transform: uppercase;
      margin-bottom: 16px;
      text-align: center;
    }

    #reward-subtitle {
      font-size: 16px;
      letter-spacing: 3px;
      color: #555;
      text-align: center;
      font-style: italic;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      opacity: 0.3;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: #333;
    }

    #crosshair::before {
      width: 2px;
      height: 100%;
      left: 50%;
      transform: translateX(-50%);
    }

    #crosshair::after {
      height: 2px;
      width: 100%;
      top: 50%;
      transform: translateY(-50%);
    }

    #hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0,0,0,0.2);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="counter">0 / 100</div>
    <div id="event-name"></div>
    <div id="crosshair"></div>
    <div id="hint">CLICK TO LOOK AROUND</div>
  </div>

  <div id="reward-overlay">
    <div id="reward-title">YOU DID IT. 100 CLICKS.</div>
    <div id="reward-subtitle">here's your reward: nothing. and everything.</div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
